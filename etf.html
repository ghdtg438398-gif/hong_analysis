<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ETF 레이더 — 한국 전체 ETF</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
:root{
  --bg:#07090c;--bg2:#0e1118;--bg3:#151923;--bg4:#1c2230;
  --bd:rgba(255,255,255,0.06);--bd2:rgba(255,255,255,0.11);--bd3:rgba(255,255,255,0.18);
  --tx:#d8dce8;--tx2:#7880a0;--tx3:#424860;
  --ac:#4d8ef5;--ac2:rgba(77,142,245,0.10);
  --up:#ef6058;--dn:#4d8ef5;--gr:#3dc88a;--gr2:rgba(61,200,138,0.10);
  --am:#f4a21e;--am2:rgba(244,162,30,0.10);
  --mono:'DM Mono',monospace;--sans:'Noto Sans KR',sans-serif;--r:8px;--rl:14px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:var(--sans);background:var(--bg);color:var(--tx);font-size:14px;line-height:1.6;overflow:hidden;display:flex;flex-direction:column}
header{flex-shrink:0;height:52px;padding:0 18px;display:flex;align-items:center;gap:12px;background:rgba(7,9,12,.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--bd);z-index:100}
.logo{font-size:15px;font-weight:700;letter-spacing:-.3px}.logo em{color:var(--ac);font-style:normal}
.logo a{color:var(--tx2);font-size:11px;font-weight:400;text-decoration:none;margin-left:4px}.logo a:hover{color:var(--tx)}
.hbadge{font-size:9px;font-family:var(--mono);background:var(--ac2);color:var(--ac);padding:2px 7px;border-radius:4px;letter-spacing:.5px}
.hright{margin-left:auto;display:flex;align-items:center;gap:10px}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--gr);animation:blink 2.5s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.htime{font-size:11px;font-family:var(--mono);color:var(--tx3)}
.body{display:flex;flex:1;overflow:hidden}
.sidebar{width:300px;flex-shrink:0;border-right:1px solid var(--bd);display:flex;flex-direction:column;background:var(--bg2)}
.sb-top{padding:12px 12px 8px;border-bottom:1px solid var(--bd);display:flex;flex-direction:column;gap:8px}
.search-input{width:100%;background:var(--bg3);border:1px solid var(--bd2);border-radius:var(--r);padding:8px 12px;color:var(--tx);font-family:var(--sans);font-size:12px;outline:none;transition:border-color .15s}
.search-input::placeholder{color:var(--tx3)}.search-input:focus{border-color:var(--ac)}
.filter-row{display:flex;gap:5px;flex-wrap:wrap}
.chip{font-size:10px;padding:3px 9px;border-radius:20px;border:1px solid var(--bd2);background:transparent;color:var(--tx2);cursor:pointer;transition:all .12s;white-space:nowrap}
.chip:hover{color:var(--tx);border-color:var(--bd3)}.chip.on{background:var(--ac2);border-color:var(--ac);color:var(--ac)}
.sort-bar{display:flex;border-bottom:1px solid var(--bd);flex-shrink:0}
.sort-btn{flex:1;padding:6px 0;font-size:10px;font-family:var(--mono);background:transparent;border:none;color:var(--tx3);cursor:pointer;transition:all .12s;border-right:1px solid var(--bd)}
.sort-btn:last-child{border-right:none}.sort-btn:hover{color:var(--tx2)}.sort-btn.on{color:var(--ac)}
.stat-bar{display:flex;border-bottom:1px solid var(--bd);flex-shrink:0}
.stat-cell{flex:1;padding:5px 0;text-align:center;font-size:10px;font-family:var(--mono);color:var(--tx3);border-right:1px solid var(--bd)}
.stat-cell:last-child{border-right:none}.stat-cell strong{display:block;font-size:13px;font-weight:500}
.mkt-status-bar{padding:4px 12px;font-size:10px;font-family:var(--mono);border-bottom:1px solid var(--bd);flex-shrink:0;background:var(--bg3);display:flex;align-items:center;gap:6px}
.ms-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.ms-open{background:var(--gr);animation:blink 2s infinite}.ms-closed{background:var(--tx3)}
.etf-list{flex:1;overflow-y:auto}.etf-list::-webkit-scrollbar{width:3px}.etf-list::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:2px}
.etf-item{padding:10px 12px;border-bottom:1px solid var(--bd);cursor:pointer;transition:background .1s}
.etf-item:hover{background:var(--bg3)}.etf-item.active{background:var(--ac2);border-left:2px solid var(--ac)}
.ei-row1{display:flex;justify-content:space-between;align-items:baseline;gap:4px}
.ei-name{font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:185px}
.ei-pct{font-size:11px;font-family:var(--mono);font-weight:500;flex-shrink:0}
.ei-row2{display:flex;justify-content:space-between;margin-top:2px}
.ei-code{font-size:9px;font-family:var(--mono);color:var(--tx3)}
.ei-nav{font-size:10px;font-family:var(--mono);color:var(--tx2)}
.ei-cat{font-size:9px;color:var(--tx3);margin-top:1px}
.ei-badge{font-size:8px;font-family:var(--mono);background:var(--am2);color:var(--am);padding:1px 5px;border-radius:3px;margin-left:4px}
.main{flex:1;overflow-y:auto;padding:18px;display:flex;flex-direction:column;gap:12px}
.main::-webkit-scrollbar{width:3px}.main::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:2px}
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:9px}
.mc{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r);padding:13px 15px;position:relative;overflow:hidden}
.mc-lbl{font-size:9px;color:var(--tx3);letter-spacing:.3px;margin-bottom:4px;text-transform:uppercase}
.mc-val{font-size:19px;font-weight:700;font-family:var(--mono);letter-spacing:-.5px}
.mc-sub{font-size:9px;color:var(--tx3);font-family:var(--mono);margin-top:3px}
.up{color:var(--up)}.dn{color:var(--dn)}.neu{color:var(--tx)}
.panel{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--rl);padding:16px 18px}
.pt{font-size:9px;font-weight:500;color:var(--tx3);letter-spacing:.9px;text-transform:uppercase;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.pt::after{content:'';flex:1;height:1px;background:var(--bd)}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
@media(max-width:1100px){.g3{grid-template-columns:1fr 1fr}}
@media(max-width:800px){.g2{grid-template-columns:1fr}}
.chart-wrap{position:relative;width:100%;height:190px}
.hr{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--bd)}.hr:last-child{border-bottom:none}
.hr-rk{font-size:9px;font-family:var(--mono);color:var(--tx3);width:13px;text-align:right}
.hr-info{flex:1;min-width:0}.hr-nm{font-size:11px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.hr-tk{font-size:9px;font-family:var(--mono);color:var(--tx3)}
.hr-bg{width:55px;height:3px;background:var(--bg4);border-radius:2px}.hr-bar{height:100%;background:var(--ac);border-radius:2px;transition:width .4s}
.hr-pct{font-size:10px;font-family:var(--mono);min-width:32px;text-align:right}
.rr{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--bd);font-size:11px}.rr:last-child{border-bottom:none}
.rr-l{color:var(--tx2)}.rr-v{font-family:var(--mono);font-weight:500}
.ic{background:var(--bg3);border-radius:var(--r);padding:11px 13px}.ic-l{font-size:9px;color:var(--tx3);letter-spacing:.4px;margin-bottom:3px}.ic-v{font-size:12px;font-weight:500;font-family:var(--mono)}
.fallback-notice{background:var(--am2);border:1px solid rgba(244,162,30,.2);border-radius:var(--r);padding:7px 12px;font-size:11px;color:var(--am);font-family:var(--mono);margin-bottom:8px}
.spinner{width:20px;height:20px;border:2px solid var(--bd2);border-top-color:var(--ac);border-radius:50%;animation:spin .7s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}
.placeholder{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;min-height:350px;color:var(--tx3);font-size:13px;text-align:center}
.fade-in{animation:fi .22s ease}
@keyframes fi{from{opacity:0;transform:translateY(3px)}to{opacity:1;transform:none}}
</style>
</head>
<body>
<header>
  <div class="logo">ETF <em>레이더</em> <a href="index.html">← 홈</a></div>
  <div class="hbadge">KRX 전체</div>
  <div class="hright">
    <div class="live-dot"></div>
    <div class="htime" id="htime">—</div>
  </div>
</header>
<div class="body">
  <div class="sidebar">
    <div class="sb-top">
      <input class="search-input" id="searchBox" type="text" placeholder="ETF명 또는 종목코드 검색..." oninput="onSearch()">
      <div class="filter-row" id="filterRow"></div>
    </div>
    <div class="sort-bar">
      <button class="sort-btn on" id="sort-pct" onclick="setSort('pct')">등락률</button>
      <button class="sort-btn" id="sort-nav" onclick="setSort('nav')">NAV</button>
      <button class="sort-btn" id="sort-aum" onclick="setSort('aum')">순자산</button>
      <button class="sort-btn" id="sort-vol" onclick="setSort('vol')">거래량</button>
      <button class="sort-btn" id="sort-name" onclick="setSort('name')">이름</button>
    </div>
    <div class="stat-bar">
      <div class="stat-cell">전체<strong id="stTotal" style="color:var(--tx2)">—</strong></div>
      <div class="stat-cell">상승<strong id="stUp" style="color:var(--up)">—</strong></div>
      <div class="stat-cell">하락<strong id="stDn" style="color:var(--dn)">—</strong></div>
      <div class="stat-cell">보합<strong id="stFl" style="color:var(--tx2)">—</strong></div>
    </div>
    <div class="mkt-status-bar"><div class="ms-dot ms-closed" id="msDot"></div><span id="msText">—</span></div>
    <div class="etf-list" id="etfList"><div style="padding:40px;text-align:center"><span class="spinner"></span></div></div>
  </div>
  <div class="main" id="mainPanel">
    <div class="placeholder"><div style="font-size:40px">📊</div><div>왼쪽에서 ETF를 선택하세요</div><div style="font-size:11px">전체 한국 상장 ETF · 타임폴리오 · PLUS · SMART 모두 포함</div></div>
  </div>
</div>
<script>
// ── 설정 ──
const PUBLIC_KEY = 'c40d2dfc83919a17dd1c0353420d431e750e0191f7b8452cea5c37283198b9ce';
const ETF_BASE   = 'https://apis.data.go.kr/1160100/service/GetSecuritiesProductInfoService/getETFPriceInfo';
const PROXY      = 'https://corsproxy.io/?';
const CATS = ['전체','국내주식','해외주식','채권','레버리지','인버스','섹터','원자재','부동산','통화','혼합'];

let allEtfs=[], filtered=[], selected=null;
let catFilter='전체', sortKey='pct', sortAsc=false;
let isDemo=false, navChart=null;

// ── 장 상태 ──
function getMarketState(){
  const kst=new Date(new Date().toLocaleString('en-US',{timeZone:'Asia/Seoul'}));
  const day=kst.getDay(), t=kst.getHours()*60+kst.getMinutes();
  if(day===0||day===6) return 'closed';
  if(t>=570&&t<930)   return 'open';
  return 'closed';
}
function updateMktStatus(){
  const isOpen=getMarketState()==='open';
  const dot=document.getElementById('msDot'),txt=document.getElementById('msText');
  if(dot)dot.className='ms-dot '+(isOpen?'ms-open':'ms-closed');
  if(txt)txt.textContent=isOpen?'장중 · 실시간 NAV':'장 마감 · 종가 기준';
}

// ── 포맷 ──
const f={
  n:  v=>v==null?'—':Math.round(v).toLocaleString('ko-KR'),
  px: v=>v==null?'—':Math.round(v).toLocaleString('ko-KR')+'원',
  pct:v=>v==null?'—':(v>=0?'+':'')+Number(v).toFixed(2)+'%',
  vol:v=>{if(!v)return'—';if(v>=1e8)return(v/1e8).toFixed(1)+'억주';if(v>=1e4)return(v/1e4).toFixed(1)+'만주';return v.toLocaleString()+'주'},
  aum:v=>{if(!v)return'—';if(v>=1e12)return(v/1e12).toFixed(1)+'조원';if(v>=1e8)return(v/1e8).toFixed(0)+'억원';return v.toLocaleString()+'원'},
  now:()=>new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit',second:'2-digit'}),
};
const cls=v=>v>0?'up':v<0?'dn':'neu';

function classify(nm){
  if(!nm)return'국내주식';
  if(/레버리지|2X|3X/i.test(nm)&&!/인버스/i.test(nm))return'레버리지';
  if(/인버스|INVERSE|숏/i.test(nm))return'인버스';
  if(/미국|나스닥|S&P|DOW|해외|중국|일본|유럽|인도|베트남|신흥|홍콩|대만|브라질|글로벌|선진|이머징/i.test(nm))return'해외주식';
  if(/채권|국채|회사채|단기채|장기채|통안채|하이일드|크레딧|TIPS|물가채|금리/i.test(nm))return'채권';
  if(/리츠|부동산|REIT/i.test(nm))return'부동산';
  if(/금$|금선물|원유|원자재|농산물|구리|천연가스/i.test(nm))return'원자재';
  if(/달러|엔화|유로|위안|환율|통화/i.test(nm))return'통화';
  if(/반도체|2차전지|바이오|헬스케어|게임|IT|방산|조선|철강|화학|자동차|미디어|로봇|AI|클라우드|수소|전기차|핀테크|우주|메타버스|ESG|배당|가치|성장/i.test(nm))return'섹터';
  if(/TDF|혼합|멀티에셋|자산배분/i.test(nm))return'혼합';
  return'국내주식';
}
function guessManager(nm){
  if(!nm)return'—';
  const map=[['KODEX','삼성자산운용'],['TIGER','미래에셋자산운용'],['ACE','한국투자신탁운용'],['SOL','신한자산운용'],['KBSTAR','KB자산운용'],['HANARO','NH아문디자산운용'],['ARIRANG','한화자산운용'],['TIMEFOLIO','타임폴리오자산운용'],['타임폴리오','타임폴리오자산운용'],['PLUS','한국투자신탁운용'],['KOSEF','키움투자자산운용'],['히어로즈','키움투자자산운용'],['SMART','삼성자산운용']];
  for(const[k,v]of map)if(nm.toUpperCase().includes(k.toUpperCase()))return v;
  return'기타';
}
function guessIndex(nm){
  if(!nm)return'—';
  if(/나스닥100/.test(nm))return'NASDAQ-100';
  if(/S&P500/.test(nm))return'S&P 500';
  if(/KOSPI200|200$|코스피200/.test(nm))return'KOSPI 200';
  if(/KOSDAQ150|코스닥150/.test(nm))return'KOSDAQ 150';
  if(/반도체/.test(nm))return'KRX 반도체';
  if(/레버리지/.test(nm))return'KOSPI 200 ×2';
  if(/인버스/.test(nm))return'KOSPI 200 ×-1';
  if(/채권/.test(nm))return'국내채권지수';
  return'—';
}

// ── API 조회 ──
async function fetchPage(pageNo, numOfRows){
  const url=`${ETF_BASE}?serviceKey=${PUBLIC_KEY}&resultType=json&numOfRows=${numOfRows}&pageNo=${pageNo}`;
  let res;
  try{res=await fetch(url,{signal:AbortSignal.timeout(12000)});}catch{}
  if(!res?.ok)try{res=await fetch(PROXY+encodeURIComponent(url),{signal:AbortSignal.timeout(15000)});}catch{}
  if(!res?.ok)throw new Error('fetch 실패');
  const json=await res.json();
  const body=json?.response?.body;
  if(!body)throw new Error('응답 형식 오류');
  return body;
}

function parseItem(it){
  const isOpen=getMarketState()==='open';
  // 장중: 현재 NAV / 장외: 전일종가(prevddClsprc) 우선
  const navRaw  = isOpen
    ? (parseFloat(it.nav??it.clsprc??0)||null)
    : (parseFloat(it.prevddClsprc??it.clsprc??it.nav??0)||null);
  const prev    = parseFloat(it.prevddClsprc??0)||null;
  const chgAmt  = isOpen ? (parseFloat(it.cmpprevddPrc??0)||(navRaw&&prev?navRaw-prev:null)) : 0;
  const chgPct  = isOpen ? (parseFloat(it.flctnrt??0)||(prev&&chgAmt?chgAmt/prev*100:null)) : 0;
  return{
    code:it.isuSrtCd||it.iscd||'—',
    name:it.isuNm||it.isnm||'—',
    nav:navRaw, prev, chgAmt, chgPct,
    open:parseFloat(it.opnprc??0)||null,
    high:parseFloat(it.hgprc??0)||null,
    low:parseFloat(it.lwprc??0)||null,
    volume:parseInt(it.accTrdvol??0)||null,
    aum:parseFloat(it.netAssetTotamt??0)||null,
    ter:it.totCostRt??null,
    cat:classify(it.isuNm||it.isnm),
    isFallback:!isOpen,
  };
}

async function loadAllETFs(){
  try{
    const first=await fetchPage(1,100);
    const total=parseInt(first.totalCount)||0;
    let items=normalizeItems(first.items?.item);
    if(total>100){
      const pages=Math.ceil((total-100)/1000);
      const results=await Promise.allSettled(Array.from({length:pages},(_,i)=>fetchPage(i+2,1000)));
      results.forEach(r=>{if(r.status==='fulfilled')items=items.concat(normalizeItems(r.value.items?.item));});
    }
    allEtfs=items.map(parseItem);
  }catch(e){
    console.warn('ETF API 오류, 데모 전환:',e.message);
    isDemo=true;allEtfs=generateDemo();
  }
  buildUI();
}
function normalizeItems(raw){if(!raw)return[];return Array.isArray(raw)?raw:[raw];}

// ── 데모 데이터 ──
function generateDemo(){
  const seed=[{n:'KODEX 200',c:'069500'},{n:'TIGER 미국나스닥100',c:'133690'},{n:'TIMEFOLIO Korea플러스배당액티브',c:'441640'},{n:'PLUS 200',c:'278240'},{n:'ACE 미국S&P500',c:'360200'},{n:'SOL 미국배당다우존스',c:'446720'},{n:'KBSTAR 200',c:'278240'},{n:'HANARO 200',c:'293180'},{n:'KODEX 레버리지',c:'122630'},{n:'KODEX 인버스',c:'114800'},{n:'KODEX 반도체',c:'091160'},{n:'TIGER 2차전지테마',c:'305540'},{n:'KODEX 골드선물H',c:'132030'},{n:'TIGER 단기채권',c:'157450'},{n:'KODEX 한국부동산리츠인프라',c:'432320'},{n:'TIGER 미국S&P500',c:'360750'},{n:'ACE 미국나스닥100',c:'379810'},{n:'KODEX KOSDAQ150',c:'229200'}];
  const isOpen=getMarketState()==='open';
  return seed.map(s=>{
    const base=10000+Math.random()*90000;
    const chgPct=isOpen?(Math.random()-.47)*7:0;
    const prev=base/(1+chgPct/100);
    return{code:s.c,name:s.n,cat:classify(s.n),nav:isOpen?+base.toFixed(0):+prev.toFixed(0),prev:+prev.toFixed(0),chgPct:+chgPct.toFixed(2),chgAmt:isOpen?+(base-prev).toFixed(0):0,open:+(prev*(1+(Math.random()-.5)*.003)).toFixed(0),high:+(base*(1+Math.random()*.012)).toFixed(0),low:+(base*(1-Math.random()*.012)).toFixed(0),volume:Math.round(Math.random()*800000+5000),aum:Math.round(Math.random()*5e12+1e10),ter:+(Math.random()*.9+.05).toFixed(2),isDemo:true,isFallback:!isOpen};
  });
}

// ── UI 구성 ──
function buildUI(){
  const row=document.getElementById('filterRow');
  row.innerHTML=CATS.map(c=>`<button class="chip${c===catFilter?' on':''}" onclick="setCat('${c}')">${c}</button>`).join('');
  updateMktStatus();
  applyFilter();
  if(isDemo)console.log('데모 모드로 실행 중');
}

function setCat(c){catFilter=c;document.querySelectorAll('.chip').forEach(b=>b.classList.toggle('on',b.textContent===c));applyFilter();}
function setSort(k){if(sortKey===k)sortAsc=!sortAsc;else{sortKey=k;sortAsc=k==='name';}document.querySelectorAll('.sort-btn').forEach(b=>b.classList.toggle('on',b.id==='sort-'+k));applyFilter();}
function onSearch(){applyFilter();}

function applyFilter(){
  const q=(document.getElementById('searchBox')?.value||'').toLowerCase();
  filtered=allEtfs.filter(e=>{
    const mc=catFilter==='전체'||e.cat===catFilter;
    const mq=!q||e.name.toLowerCase().includes(q)||e.code.includes(q);
    return mc&&mq;
  });
  filtered.sort((a,b)=>{
    let va,vb;
    if(sortKey==='pct'){va=a.chgPct??-Infinity;vb=b.chgPct??-Infinity;}
    if(sortKey==='nav'){va=a.nav??0;vb=b.nav??0;}
    if(sortKey==='aum'){va=a.aum??0;vb=b.aum??0;}
    if(sortKey==='vol'){va=a.volume??0;vb=b.volume??0;}
    if(sortKey==='name'){va=a.name;vb=b.name;}
    if(va<vb)return sortAsc?-1:1;if(va>vb)return sortAsc?1:-1;return 0;
  });
  const up=filtered.filter(e=>(e.chgPct??0)>0).length,dn=filtered.filter(e=>(e.chgPct??0)<0).length;
  document.getElementById('stTotal').textContent=filtered.length;
  document.getElementById('stUp').textContent=up;
  document.getElementById('stDn').textContent=dn;
  document.getElementById('stFl').textContent=filtered.length-up-dn;
  renderList();
}

function renderList(){
  const list=document.getElementById('etfList');
  const isOpen=getMarketState()==='open';
  if(!filtered.length){list.innerHTML='<div style="padding:40px;text-align:center;color:var(--tx3);font-size:13px">검색 결과 없음</div>';return;}
  list.innerHTML=filtered.map(e=>`
    <div class="etf-item${selected?.code===e.code?' active':''}" onclick="selectEtf('${e.code}')">
      <div class="ei-row1">
        <span class="ei-name">${e.name}</span>
        <span class="ei-pct ${cls(e.chgPct)}">${isOpen?f.pct(e.chgPct):'—'}</span>
      </div>
      <div class="ei-row2">
        <span class="ei-code">${e.code}</span>
        <span class="ei-nav">${f.px(e.nav)}${!isOpen?'<span class="ei-badge">종가</span>':''}</span>
      </div>
      <div class="ei-cat">${e.cat}</div>
    </div>`).join('');
}

function selectEtf(code){
  selected=allEtfs.find(e=>e.code===code)||filtered.find(e=>e.code===code);
  if(!selected)return;
  document.querySelectorAll('.etf-item').forEach(el=>el.classList.toggle('active',el.querySelector('.ei-code')?.textContent===code));
  renderDetail(selected);
}

function renderDetail(e){
  const isOpen=getMarketState()==='open';
  const rets=sampleReturns(e), holds=sampleHoldings(e);
  const holdHtml=(()=>{const mx=Math.max(...holds.map(h=>h.pct));return holds.map((h,i)=>`<div class="hr"><span class="hr-rk">${i+1}</span><div class="hr-info"><div class="hr-nm">${h.name}</div><div class="hr-tk">${h.ticker}</div></div><div class="hr-bg"><div class="hr-bar" style="width:${(h.pct/mx*100).toFixed(0)}%"></div></div><span class="hr-pct">${h.pct.toFixed(1)}%</span></div>`).join('');})();
  const retHtml=Object.entries(rets).map(([l,v])=>`<div class="rr"><span class="rr-l">${l}</span><span class="rr-v ${cls(v)}">${f.pct(v)}</span></div>`).join('');
  const infoItems=[['종목코드',e.code],['카테고리',e.cat],['운용사',guessManager(e.name)],['추종지수',guessIndex(e.name)],['총보수(TER)',e.ter!=null?e.ter+'%':'—'],['순자산(AUM)',f.aum(e.aum)]];
  const naver=`https://finance.naver.com/item/main.naver?code=${e.code}`;

  document.getElementById('mainPanel').innerHTML=`<div class="fade-in">
    ${!isOpen?`<div class="fallback-notice">⏰ 장 마감 · ${e.isFallback?'전일':'당일'} 종가 기준으로 표시됩니다</div>`:''}
    <div class="metrics">
      <div class="mc"><div class="mc-lbl">${isOpen?'현재 NAV':'종가 (NAV)'}</div><div class="mc-val neu" style="font-size:17px">${f.px(e.nav)}</div><div class="mc-sub">${isOpen?'실시간':'전일 종가 '+f.px(e.prev)}</div></div>
      <div class="mc"><div class="mc-lbl">당일 등락률</div><div class="mc-val ${cls(e.chgPct)}">${isOpen?f.pct(e.chgPct):'—'}</div><div class="mc-sub">${isOpen?(e.chgAmt>=0?'+':'')+f.n(e.chgAmt)+'원':'장 마감'}</div></div>
      <div class="mc"><div class="mc-lbl">시가</div><div class="mc-val neu" style="font-size:15px">${isOpen?f.px(e.open):'—'}</div><div class="mc-sub">전일종가 ${f.px(e.prev)}</div></div>
      <div class="mc"><div class="mc-lbl">고가 / 저가</div><div class="mc-val up" style="font-size:14px">${isOpen?f.px(e.high):'—'}</div><div class="mc-sub">저가 ${isOpen?f.px(e.low):'—'}</div></div>
      <div class="mc"><div class="mc-lbl">거래량</div><div class="mc-val neu" style="font-size:15px">${f.vol(e.volume)}</div><div class="mc-sub">순자산 ${f.aum(e.aum)}</div></div>
    </div>
    <div class="g2">
      <div class="panel"><div class="pt">NAV 추이 (샘플)</div><div class="chart-wrap"><canvas id="navChart"></canvas></div></div>
      <div class="panel"><div class="pt">기간별 수익률 (샘플)</div>${retHtml}</div>
    </div>
    <div class="g2">
      <div class="panel"><div class="pt">구성 종목 TOP 10 (샘플)</div>${holdHtml}</div>
      <div class="panel">
        <div class="pt">ETF 기본 정보</div>
        ${infoItems.map(([l,v])=>`<div class="ic" style="margin-bottom:8px"><div class="ic-l">${l}</div><div class="ic-v">${v}</div></div>`).join('')}
        <a href="${naver}" target="_blank" style="font-size:11px;color:var(--ac);font-family:var(--mono)">네이버 금융에서 상세정보 ↗</a>
      </div>
    </div>
  </div>`;
  drawChart(e);
  document.getElementById('htime').textContent=f.now();
}

function drawChart(e){
  const ctx=document.getElementById('navChart');if(!ctx)return;
  if(navChart){navChart.destroy();navChart=null;}
  const isOpen=getMarketState()==='open';
  const base=e.nav||10000, open=e.open||base; let v=open;
  const pts=Array.from({length:72},()=>{v+=(Math.random()-.478)*base*.002;return+v.toFixed(0)});pts[71]=base;
  const labels=Array.from({length:72},(_,i)=>{const m=9*60+i*5;return`${String(Math.floor(m/60)).padStart(2,'0')}:${String(m%60).padStart(2,'0')}`});
  const isUp=(e.chgPct||0)>=0;
  navChart=new Chart(ctx,{type:'line',data:{labels,datasets:[{data:pts,borderColor:isUp?'#ef6058':'#4d8ef5',borderWidth:1.5,pointRadius:0,tension:.25,fill:true,backgroundColor:isUp?'rgba(239,96,88,.07)':'rgba(77,142,245,.07)'}]},options:{responsive:true,maintainAspectRatio:false,animation:{duration:280},plugins:{legend:{display:false},tooltip:{mode:'index',intersect:false,backgroundColor:'#0e1118',borderColor:'rgba(255,255,255,.07)',borderWidth:1,titleColor:'#424860',bodyColor:'#d8dce8',callbacks:{label:c=>' '+Math.round(c.parsed.y).toLocaleString()+'원'}}},scales:{x:{grid:{color:'rgba(255,255,255,.03)'},ticks:{color:'#424860',font:{size:9,family:"'DM Mono'"},maxTicksLimit:8,maxRotation:0}},y:{position:'right',grid:{color:'rgba(255,255,255,.03)'},ticks:{color:'#424860',font:{size:9,family:"'DM Mono'"},callback:v=>Math.round(v).toLocaleString()}}}}});
}

function sampleReturns(e){const b=e.chgPct||0,r=(base,sp)=>+(base+(Math.random()-.5)*sp).toFixed(2);return{'1주':r(b*.7,2.5),'1개월':r(b*3,5),'3개월':r(b*8,9),'6개월':r(b*13,13),'1년':r(b*22,20),'YTD':r(b*16,16)};}
const holdPools={'국내주식':[['삼성전자','005930'],['SK하이닉스','000660'],['LG에너지솔루션','373220'],['삼성바이오로직스','207940'],['현대차','005380'],['기아','000270'],['POSCO홀딩스','005490'],['KB금융','105560'],['셀트리온','068270'],['신한지주','055550']],'해외주식':[['애플','AAPL'],['마이크로소프트','MSFT'],['엔비디아','NVDA'],['아마존','AMZN'],['알파벳','GOOGL'],['메타','META'],['테슬라','TSLA'],['브로드컴','AVGO'],['코스트코','COST'],['ASML','ASML']],'채권':[['국고채24-1','KTB'],['통안채24-05','MSB'],['국고채23-9','KTB'],['통안채24-08','MSB'],['산금채24-3','KDB'],['기은채24-2','IBK'],['수은채24-1','KExim'],['국고채24-3','KTB'],['통안채24-11','MSB'],['산금채24-7','KDB']],'섹터':[['삼성전자','005930'],['SK하이닉스','000660'],['DB하이텍','000990'],['리노공업','058470'],['원익IPS','240810'],['ISC','095340'],['하나마이크론','067310'],['테크윙','089030'],['심텍','222800'],['한미반도체','042700']],'레버리지':[['KOSPI200선물','FUTURES'],['현금','CASH']],'인버스':[['KOSPI200선물매도','FUTURES-S'],['현금','CASH']],'원자재':[['금선물','GOLD'],['은선물','SILVER'],['원유선물','WTI'],['구리선물','COPPER'],['천연가스선물','NATGAS']],'부동산':[['롯데리츠','330590'],['ESR켄달스퀘어리츠','365550'],['SK리츠','395400'],['코람코에너지리츠','357120'],['신한알파리츠','293940']],'통화':[['달러선물','USD'],['엔화선물','JPY']],'혼합':[['삼성전자','005930'],['국고채24-1','KTB'],['애플','AAPL'],['POSCO홀딩스','005490'],['현금','CASH']]};
function sampleHoldings(e){const pool=holdPools[e.cat]||holdPools['국내주식'];let rem=100;return pool.slice(0,Math.min(10,pool.length)).map((p,i,arr)=>{const pct=i===arr.length-1?+rem.toFixed(1):+(Math.random()*(rem/(arr.length-i)*1.6)).toFixed(1);rem=+(rem-pct).toFixed(1);return{name:p[0],ticker:p[1],pct:Math.max(pct,.1)};}).sort((a,b)=>b.pct-a.pct);}

(function init(){
  setInterval(()=>{document.getElementById('htime').textContent=f.now();updateMktStatus();},5000);
  document.getElementById('htime').textContent=f.now();
  loadAllETFs();
})();
</script>
